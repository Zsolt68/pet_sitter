<!-- Sitters form template -->
{% extends "core/base.html" %}
{% block title %}{{ title }}{% endblock %}
{% block content %}
<h2>{{ title }}</h2>

<form method="POST">
    {% csrf_token %}
    {{ form.as_p }}

    <button class="btn btn-success" type="submit">Save</button>
    <a href="{% url 'sitter_list' %}" class="btn btn-secondary">Back</a>
</form>
{% endblock %}
