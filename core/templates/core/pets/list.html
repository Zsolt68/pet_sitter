{% extends "core/base.html" %}
{% block title %}My Pets{% endblock %}
{% block content %}
<h2>My Pets</h2>

<a href="{% url 'pet_create' %}" class="btn btn-primary mb-3">Add Pet</a>

{% if pets %}
<ul class="list-group">
    {% for pet in pets %}
    <li class="list-group-item d-flex justify-content-between align-items-center">
        <span>{{ pet.name }} ({{ pet.species }})</span>
        <span>
            <a href="{% url 'pet_update' pet.pk %}" class="btn btn-sm btn-warning">Edit</a>
            <a href="{% url 'pet_delete' pet.pk %}" class="btn btn-sm btn-danger">Delete</a>
        </span>
    </li>
    {% endfor %}
</ul>
{% else %}
<p>No pets added yet.</p>
{% endif %}
{% endblock %}
