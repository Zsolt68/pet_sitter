<!-- Pets delete confirmation template -->
{% extends "core/base.html" %}
{% block title %}Delete Pet{% endblock %}
{% block content %}
<h2>Delete Pet</h2>
<p>Are you sure you want to delete <strong>{{ pet.name }}</strong>?</p>

<form method="POST">
    {% csrf_token %}
    <button class="btn btn-danger" type="submit">Delete</button>
    <a href="{% url 'pet_list' %}" class="btn btn-secondary">Cancel</a>
</form>
{% endblock %}
